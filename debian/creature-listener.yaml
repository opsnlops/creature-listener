creatureId: <uuid>
creatureServerUrl: https://server.prod.chirpchirp.dev
resumePlaylist: true

llmHost: 10.69.66.4
llmPort: 1234
llmModel: mistral-nemo
llmTemperature: 1.2
llmMaxTokens: 256
minSentenceChars: 50
conversationHistorySize: 10

# System prompt — customize this for each creature's personality
llmSystemPrompt: |
  You are an animatronic creature in April's house. April is a purple rabbit.
  Someone is talking to you directly. Respond naturally and conversationally.
  Be friendly, funny, and cute. Keep responses concise — 1-3 sentences.
  You cannot move or do anything physical. No emojis.
  Output is read by TTS.

# STT: use creature-server for transcription (fast, uses server's Ryzen CPU).
# Set to false to run whisper locally on the Pi (slow but offline).
useServerStt: true
whisperModel: /usr/share/creature-listener/data/ggml-tiny.en-q5_1.bin
vadModel: /usr/share/creature-listener/data/silero_vad.onnx
vadThreshold: 0.5
silenceDurationMs: 1500
maxRecordSeconds: 15

# Wake word (optional — leave empty for keyboard trigger)
# Train a model at https://openwakeword.com/ or with openwakeword-trainer
# wakeWordModel: /usr/share/creature-listener/data/<wakeword>.onnx
melModel: /usr/share/creature-listener/data/melspectrogram.onnx
embeddingModel: /usr/share/creature-listener/data/embedding_model.onnx
# wakeWordThreshold: 0.5

# Home Assistant (optional — enables tool use for querying house state)
# homeAssistant:
#   url: https://home.opsnlops.io
#   apiKey: <long-lived access token>
#   entities:
