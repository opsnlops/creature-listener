name: Build Debian Package

on:
  push:
    branches:
      - "*"

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: debian:trixie
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential ca-certificates cmake git ninja-build pkg-config \
            libasound2-dev libcurl4-openssl-dev libssl-dev \
            debhelper devscripts fakeroot

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Collect deb artifacts
        run: |
          mkdir -p artifacts
          mv ../creature-listener_*_${{ matrix.arch }}.deb artifacts/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: creature-listener-${{ matrix.arch }}
          path: artifacts/*.deb
